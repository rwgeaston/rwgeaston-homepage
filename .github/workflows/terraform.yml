name: Terraform

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: ["main"]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  plan:
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
    defaults:
      run:
        working-directory: infra
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_TERRAFORM_ROLE_ARN: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
      TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required variables
        run: |
          test -n "$AWS_REGION" || (echo "Missing repo variable: AWS_REGION" && exit 1)
          test -n "$AWS_TERRAFORM_ROLE_ARN" || (echo "Missing repo secret: AWS_TERRAFORM_ROLE_ARN" && exit 1)
          test -n "$TF_STATE_BUCKET" || (echo "Missing repo variable: TF_STATE_BUCKET" && exit 1)
          test -n "$TF_STATE_KEY" || (echo "Missing repo variable: TF_STATE_KEY" && exit 1)
          test -n "$TF_LOCK_TABLE" || (echo "Missing repo variable: TF_LOCK_TABLE" && exit 1)

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="dynamodb_table=$TF_LOCK_TABLE" \
            -backend-config="encrypt=true"

      - name: Terraform plan (detailed exit code)
        id: plan
        run: |
          set +e
          terraform plan -detailed-exitcode -no-color
          EXIT_CODE=$?
          set -e

          if [ "$EXIT_CODE" -eq 1 ]; then
            echo "Terraform plan failed."
            exit 1
          fi

          if [ "$EXIT_CODE" -eq 2 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Terraform detected infrastructure changes."
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "Terraform detected no infrastructure changes."
          fi

  apply:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.plan.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    needs: [validate, plan]
    defaults:
      run:
        working-directory: infra
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_TERRAFORM_ROLE_ARN: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
      TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required variables
        run: |
          test -n "$AWS_REGION" || (echo "Missing repo variable: AWS_REGION" && exit 1)
          test -n "$AWS_TERRAFORM_ROLE_ARN" || (echo "Missing repo secret: AWS_TERRAFORM_ROLE_ARN" && exit 1)
          test -n "$TF_STATE_BUCKET" || (echo "Missing repo variable: TF_STATE_BUCKET" && exit 1)
          test -n "$TF_STATE_KEY" || (echo "Missing repo variable: TF_STATE_KEY" && exit 1)
          test -n "$TF_LOCK_TABLE" || (echo "Missing repo variable: TF_LOCK_TABLE" && exit 1)

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="dynamodb_table=$TF_LOCK_TABLE" \
            -backend-config="encrypt=true"

      - name: Terraform apply
        run: terraform apply -auto-approve
